config_name: 4_m_2_o_60x44_fixed_phased
number_of_wargame_models: 4
number_of_objectives: 3
objective_radius_size: 3
board_width: 60
board_height: 44
max_groups: 2

deployment_zone: [0, 0, 20, 44]
opponent_deployment_zone: [40, 0, 60, 44]

models:
  - {group_id: 0 }
  - {group_id: 0 }
  - {group_id: 1 }
  - {group_id: 1 }

objectives:
  - { x: 30, y: 6 }
  - { x: 30, y: 22 }
  - { x: 30, y: 38 }

reward_phases:
  - name: reach_objectives
    terminal_success_bonus: 1.0
    terminate_on_success: true
    reward_calculators:
      - type: closest_objective
        weight: 1.0
        params: { best_distance_bonus_scale: 1000.0 }
      - type: group_cohesion
        weight: 0.5
        params: { group_max_distance: 5.0, violation_penalty: -0.1 }
    success_criteria:
      type: all_at_objectives
    success_threshold: 0.95
    min_epochs: 0
    min_epochs_above_threshold: 10

  - name: reach_objectives_with_cohesion
    reward_calculators:
      - type: closest_objective
        weight: 1.0
        params: { best_distance_bonus_scale: 1000.0 }
      - type: group_cohesion
        weight: 5.0
        params: { group_max_distance: 5.0, violation_penalty: -0.1 }
    success_criteria:
      type: all_at_objectives
    success_threshold: 0.8
    min_epochs: 0
    min_epochs_above_threshold: 100
