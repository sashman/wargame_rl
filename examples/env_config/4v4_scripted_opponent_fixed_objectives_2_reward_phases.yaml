config_name: 4v4_scripted_advance_fixed_objectives_2_reward_phases
number_of_wargame_models: 4
number_of_opponent_models: 4
number_of_objectives: 3
objective_radius_size: 3
board_width: 60
board_height: 44
max_groups: 2
group_max_distance: 3
turn_order: random

deployment_zone: [0, 0, 20, 44]
opponent_deployment_zone: [40, 0, 60, 44]

opponent_policy:
  type: scripted_advance_to_objective

models:
  - { group_id: 0 }
  - { group_id: 0 }
  - { group_id: 1 }
  - { group_id: 1 }

opponent_models:
  - { group_id: 0 }
  - { group_id: 0 }
  - { group_id: 1 }
  - { group_id: 1 }

objectives:
  - { x: 30, y: 6 }
  - { x: 30, y: 22 }
  - { x: 30, y: 38 }

reward_phases:
  - name: move_and_group
    reward_calculators:
      - type: closest_objective
        weight: 1.0
      - type: group_cohesion
        weight: 1.0
        params: { group_max_distance: 5.0, violation_penalty: -0.1 }
    success_criteria:
      type: all_at_objectives
    success_threshold: 0.8
    min_epochs: 0

  - name: win_by_vp
    reward_calculators:
      - type: vp_gain
        weight: 1.0
      - type: closest_objective
        weight: 0.2
    success_criteria:
      type: player_vp_min
      params: { fraction_of_max: 0.33 }
    success_threshold: 0.8
    min_epochs: 20
